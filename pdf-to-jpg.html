<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG — PDF Craft</title>
    <meta name="description" content="Convert PDF pages to high-quality JPG images. Extract all pages as images instantly.">
    <link rel="canonical" href="https://pdf-tools-max.onrender.com/pdf-to-jpg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script src="js/tools/pdf-to-jpg.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a class="nav-logo" href="index.html">
                <div class="nav-logo-icon">PC</div>
                PDF Craft
            </a>
            <div class="nav-right">
                <a class="nav-link" href="index.html" data-i18n="nav_all_tools">全部工具</a>
                <a class="nav-link" href="blog/index.html">Blog</a>
                <div class="lang-selector">
                    <button class="lang-btn" id="lang-btn" onclick="document.getElementById('lang-dropdown').classList.toggle('show')">
                        <span id="current-lang">ZH</span>
                        <span class="lang-arrow">&#9660;</span>
                    </button>
                    <div class="lang-dropdown" id="lang-dropdown">
                        <button class="lang-option" data-lang="zh" onclick="I18N.setLang('zh');document.getElementById('lang-dropdown').classList.remove('show')">中文</button>
                        <button class="lang-option" data-lang="en" onclick="I18N.setLang('en');document.getElementById('lang-dropdown').classList.remove('show')">English</button>
                        <button class="lang-option" data-lang="es" onclick="I18N.setLang('es');document.getElementById('lang-dropdown').classList.remove('show')">Español</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="workspace-page" id="workspace">
        <div class="workspace-header">
            <div class="workspace-header-inner">
                <a class="workspace-back" href="index.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    <span data-i18n="btn_back">返回首页</span>
                </a>
                <h1 class="workspace-title" id="workspace-title">PDF to JPG</h1>
                <div></div>
            </div>
        </div>
        <p class="workspace-desc">Convert PDF pages to JPG images</p>
        <div class="workspace-body" id="workspace-body"></div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            I18N.init();
            App.openTool('pdf2jpg');
        });
    </script>
</body>
</html>
